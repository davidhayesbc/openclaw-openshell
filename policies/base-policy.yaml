# =============================================================================
# LEGACY REFERENCE — NemoClaw Migration
# =============================================================================
# This file was the raw OpenShell policy for the pre-NemoClaw setup.
# It is kept for reference only. NemoClaw manages inference routing through
# the OpenShell gateway L7 proxy; the direct egress rules for Anthropic,
# OpenAI, and OpenRouter are no longer needed in the sandbox policy.
#
# With NemoClaw:
#   - Add built-in presets via:   nemoclaw <name> policy-add <preset>
#   - Built-in presets available: brave brew discord github huggingface
#                                  jira npm outlook pypi slack telegram
#   - Custom presets via:         nemoclaw <name> policy-add --from-file <path>
#   - List active presets via:    nemoclaw <name> policy-list
#
# Custom preset format (NemoClaw YAML):
# =============================================================================
#
# name: my-preset
# description: Allow my-service API
# policies:
#   - name: my-service-write
#     match:
#       - host: api.my-service.com
#         port: 443
#         protocol: tcp
#     allow: true
#
# =============================================================================
#
# Apply a custom preset:
#   nemoclaw openclaw policy-add --from-file policies/my-preset.yaml
#
# =============================================================================