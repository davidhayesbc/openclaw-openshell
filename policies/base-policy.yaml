# =============================================================================
# OpenShell Policy: Base (Minimal) — for OpenClaw Sandbox
# =============================================================================
# This is the starting point: maximum restriction.
# Only allows outbound connections to Anthropic and OpenAI APIs.
#
# Apply with:
#   openshell policy set ${OPENSHELL_SANDBOX_NAME:-openclaw} \
#     --policy policies/base-policy.yaml --wait
#
# To extend access, use policies/extended-policy.yaml or create a custom one.
# Use `openshell policy generate` to generate policies from plain-language
# descriptions or API docs.
# =============================================================================

version: 1 

# --- Filesystem policy (locked at sandbox creation) ---
filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /lib64
    - /proc
    - /dev/urandom
    - /app
    - /etc
    - /var/log
  read_write:
    - /sandbox
    - /tmp
    - /dev/null
    - /home/node/.openclaw

landlock:
  compatibility: best_effort    # fall back gracefully on older kernels

# --- Process policy (locked at sandbox creation) ---
# NOTE: Do NOT set run_as_user/run_as_group here — the openclaw community
# image runs as 'node'. Overriding it breaks the supervisor connection.
# If you use a custom image, set the user in the Dockerfile instead.
process: {}

# --- Network policies (hot-reloadable at runtime) ---
# Only LLM API endpoints are allowed. All other outbound connections are denied.
network_policies:
  terms: &network_terms
    - name: anthropic-api-write
      endpoints:
        - host: api.anthropic.com
          port: 443
          protocol: rest
          enforcement: enforce
          access: read-write     # POST for chat completions
      binaries:
        - { path: /usr/local/bin/node }
        - { path: /usr/bin/node }

    - name: openai-api-write
      endpoints:
        - host: api.openai.com
          port: 443
          protocol: rest
          enforcement: enforce
          access: read-write
      binaries:
        - { path: /usr/local/bin/node }
        - { path: /usr/bin/node }

    - name: openrouter-api-write
      endpoints:
        - host: openrouter.ai
          port: 443
          protocol: rest
          enforcement: enforce
          access: read-write
      binaries:
        - { path: /usr/local/bin/node }
        - { path: /usr/bin/node }

    - name: ollama-local-write
      endpoints:
        - host: 127.0.0.1
          port: 11434
          protocol: rest
          enforcement: enforce
          access: read-write
        - host: localhost
          port: 11434
          protocol: rest
          enforcement: enforce
          access: read-write
      binaries:
        - { path: /usr/local/bin/node }
        - { path: /usr/bin/node }

    - name: ollama-cloud-write
      endpoints:
        - host: ollama.com
          port: 443
          protocol: rest
          enforcement: enforce
          access: read-write
      binaries:
        - { path: /usr/local/bin/node }
        - { path: /usr/bin/node }

    # DNS lookups are needed for hostname-based REST rules.
    - name: dns-udp-read
      endpoints:
        - host: 1.1.1.1
          port: 53
          protocol: udp
          enforcement: enforce
          access: read-only
        - host: 8.8.8.8
          port: 53
          protocol: udp
          enforcement: enforce
          access: read-only
      binaries:
        - { path: /usr/local/bin/node }
        - { path: /usr/bin/node }

    - name: dns-tcp-read
      endpoints:
        - host: 1.1.1.1
          port: 53
          protocol: tcp
          enforcement: enforce
          access: read-only
        - host: 8.8.8.8
          port: 53
          protocol: tcp
          enforcement: enforce
          access: read-only
      binaries:
        - { path: /usr/local/bin/node }
        - { path: /usr/bin/node }

# Compatibility alias for schema validators that still expect top-level terms.
terms: *network_terms
