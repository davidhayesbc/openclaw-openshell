# =============================================================================
# OpenShell Policy — OpenClaw Sandbox
# =============================================================================
# Allows outbound connections to LLM APIs (Anthropic, OpenAI, OpenRouter),
# local Ollama and LM Studio (via multiple host aliases), Ollama Cloud,
# Telegram bot API, GitHub API (read-only), and npm registry (read-only).
#
# Apply with:
#   openshell policy set ${OPENSHELL_SANDBOX_NAME:-openclaw} \
#     --policy policies/policy.yaml --wait
# =============================================================================

version: 1

# --- Filesystem policy (locked at sandbox creation) ---
filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /lib64
    - /proc
    - /dev/urandom
    - /app
    - /etc
    - /var/log
  read_write:
    - /sandbox
    - /tmp
    - /dev/null
    - /home/node/.openclaw
    - /home/node/.codex

landlock:
  compatibility: best_effort    # fall back gracefully on older kernels

# --- Process policy (locked at sandbox creation) ---
# NOTE: Do NOT set run_as_user/run_as_group here — the openclaw community
# image runs as 'node'. Overriding it breaks the supervisor connection.
process: {}

# --- Network policies (hot-reloadable at runtime) ---
network_policies:
  anthropic_api_write:
    name: anthropic-api-write
    endpoints:
      - host: api.anthropic.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-write
    binaries:
      - path: /usr/local/bin/node
      - path: /usr/bin/node

  openai_api_write:
    name: openai-api-write
    endpoints:
      - host: api.openai.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-write
    binaries:
      - path: /usr/local/bin/node
      - path: /usr/bin/node

  openrouter_api_write:
    name: openrouter-api-write
    endpoints:
      - host: openrouter.ai
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-write
    binaries:
      - path: /usr/local/bin/node
      - path: /usr/bin/node

  chatgpt_api_write:
    name: chatgpt-api-write
    endpoints:
      - host: chatgpt.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-write
    binaries:
      - path: /usr/local/bin/node
      - path: /usr/bin/node

  openai_auth_write:
    name: openai-auth-write
    endpoints:
      - host: auth.openai.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-write
      - host: idp.openai.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-write
    binaries:
      - path: /usr/local/bin/node
      - path: /usr/bin/node

  ollama_local_write:
    name: ollama-local-write
    endpoints:
      - host: host.openshell.internal
        port: 11434
        protocol: rest
        enforcement: enforce
        access: read-write
      - host: host.docker.internal
        port: 11434
        protocol: rest
        enforcement: enforce
        access: read-write
      - host: 127.0.0.1
        port: 11434
        protocol: rest
        enforcement: enforce
        access: read-write
      - host: localhost
        port: 11434
        protocol: rest
        enforcement: enforce
        access: read-write
    binaries:
      - path: /usr/local/bin/node
      - path: /usr/bin/node

  ollama_cloud_write:
    name: ollama-cloud-write
    endpoints:
      - host: ollama.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-write
    binaries:
      - path: /usr/local/bin/node
      - path: /usr/bin/node

  lmstudio_local_write:
    name: lmstudio-local-write
    endpoints:
      - host: host.openshell.internal
        port: 1234
        protocol: rest
        enforcement: enforce
        access: read-write
      - host: host.docker.internal
        port: 1234
        protocol: rest
        enforcement: enforce
        access: read-write
      - host: 127.0.0.1
        port: 1234
        protocol: rest
        enforcement: enforce
        access: read-write
      - host: localhost
        port: 1234
        protocol: rest
        enforcement: enforce
        access: read-write
    binaries:
      - path: /usr/local/bin/node
      - path: /usr/bin/node

  github_api_read:
    name: github-api-read
    endpoints:
      - host: api.github.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
    binaries:
      - path: /usr/bin/curl
      - path: /usr/local/bin/node
      - path: /usr/bin/git

  github_raw_read:
    name: github-raw-read
    endpoints:
      - host: raw.githubusercontent.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
    binaries:
      - path: /usr/bin/curl

  npm_registry_read:
    name: npm-registry-read
    endpoints:
      - host: registry.npmjs.org
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
    binaries:
      - path: /usr/bin/npm
      - path: /usr/local/bin/npm

  telegram_api_write:
    name: telegram-api-write
    endpoints:
      - host: api.telegram.org
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-write
    binaries:
      - path: /usr/local/bin/node
      - path: /usr/bin/node
