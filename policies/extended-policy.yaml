# =============================================================================
# LEGACY REFERENCE — NemoClaw Migration
# =============================================================================
# This file was the extended OpenShell policy for Docker-internal Ollama access
# in the pre-NemoClaw setup.
# It is kept for reference only. See base-policy.yaml for migration notes.
#
# For Ollama via NemoClaw, inference is proxied through the OpenShell gateway
# using the 'inference.local' routing. Direct host-to-container Ollama access
# is no longer required. If you need to expose Ollama for non-inference use
# (e.g. direct REST calls from within the sandbox), create a custom preset:
#
# name: ollama-docker-internal
# description: Allow direct Ollama access via Docker networking
# policies:
#   - name: ollama-host-docker-internal
#     match:
#       - host: host.docker.internal
#         port: 11434
#         protocol: tcp
#     allow: true
#   - name: ollama-gateway-docker-internal
#     match:
#       - host: gateway.docker.internal
#         port: 11434
#         protocol: tcp
#     allow: true
#
# Apply with:
#   nemoclaw openclaw policy-add --from-file policies/ollama-docker-preset.yaml
# =============================================================================