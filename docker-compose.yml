# =============================================================================
# SUPERSEDED — NemoClaw Migration
# =============================================================================
# NemoClaw manages the OpenClaw sandbox via k3s embedded in the OpenShell
# gateway container. This docker-compose.yml is NO LONGER USED by any of the
# scripts in this repo.
#
# It is retained as a reference for the security configuration that was
# applied when running OpenClaw directly with Docker Compose. The same
# security properties (capability drops, no-new-privileges, loopback port
# binding, memory/CPU limits, network isolation) are now enforced by
# OpenShell's Landlock + seccomp + netns isolation layer at the k3s pod level.
#
# If you need to run OpenClaw WITHOUT OpenShell/NemoClaw, you can adapt this
# file. Otherwise, use: scripts/start.sh
# =============================================================================
# =============================================================================
# OpenClaw Docker Compose — Security-Hardened Configuration
# =============================================================================
# Based on the official openclaw/openclaw docker-compose.yml with:
#   - Ports bound to 127.0.0.1 (loopback-only by default)
#   - All capabilities dropped
#   - no-new-privileges enforced
#   - PID limits and memory/CPU caps
#   - Log rotation configured
#   - Isolated internal network
#   - No Docker socket by default
#
# Usage:
#   cp .env.example .env && nano .env
#   scripts/validate-env.sh
#   docker compose up -d
#
# To build the image first (required before first run):
#   docker build -t openclaw:local -f Dockerfile .
# =============================================================================

networks:
  # Internal isolated network — no bridge to other containers
  openclaw-net:
    driver: bridge
    internal: false          # must be false for outbound internet (LLM APIs)
    ipam:
      config:
        - subnet: 172.30.0.0/24

services:
  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-openclaw:local}

    # Run as non-root node user
    user: "node"

    networks:
      - openclaw-net

    environment:
      HOME: /home/node
      TERM: xterm-256color
      NODE_ENV: production
      TZ: ${OPENCLAW_TZ:-UTC}
      # Secrets injected at runtime — never hardcode here
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:?OPENCLAW_GATEWAY_TOKEN must be set}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: "false"

    volumes:
      # Config and credentials — read/write required
      - ${OPENCLAW_CONFIG_DIR:-./openclaw-config}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR:-./openclaw-workspace}:/home/node/.openclaw/workspace
      # Optionally mount a read-only policy/config directory
      # - ./config:/home/node/.openclaw-config:ro

      ## To enable agent sandboxing, uncomment the Docker socket mount and
      ## set DOCKER_GID in .env. See docs/security.md for implications.
      # - /var/run/docker.sock:/var/run/docker.sock

    # group_add:
    #   - "${DOCKER_GID:-999}"

    ports:
      # Bind only to loopback — change to "0.0.0.0:..." only if you need
      # external access AND have set up the reverse proxy in docs/security.md
      - "127.0.0.1:${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "127.0.0.1:${OPENCLAW_BRIDGE_PORT:-18790}:18790"

    cap_drop:
      - ALL
    cap_add:
      # Node.js needs the ability to bind ports above 1024 — nothing else
      - NET_BIND_SERVICE

    security_opt:
      - no-new-privileges:true

    # Limit blast radius if compromised
    pids_limit: 200
    mem_limit: 1g
    memswap_limit: 1g
    cpus: "1.0"

    # Log rotation — prevents disk exhaustion and limits sensitive data retention
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
        # Redact tokens in logs (Docker 23+)
        labels: "openclaw-gateway"

    init: true
    restart: unless-stopped

    command:
      - "node"
      - "dist/index.js"
      - "gateway"
      - "--bind"
      - "${OPENCLAW_GATEWAY_BIND:-loopback}"
      - "--port"
      - "18789"

    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # -------------------------------------------------------------------------
  # CLI helper — for running openclaw management commands.
  # Not started by default; use: docker compose run --rm openclaw-cli <cmd>
  # -------------------------------------------------------------------------
  openclaw-cli:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    profiles:
      - cli              # Only starts if: docker compose --profile cli run openclaw-cli
    user: "node"
    network_mode: "service:openclaw-gateway"

    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

    pids_limit: 50

    environment:
      HOME: /home/node
      TERM: xterm-256color
      TZ: ${OPENCLAW_TZ:-UTC}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:?OPENCLAW_GATEWAY_TOKEN must be set}
      BROWSER: echo
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}

    volumes:
      - ${OPENCLAW_CONFIG_DIR:-./openclaw-config}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR:-./openclaw-workspace}:/home/node/.openclaw/workspace

    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
    depends_on:
      openclaw-gateway:
        condition: service_healthy
